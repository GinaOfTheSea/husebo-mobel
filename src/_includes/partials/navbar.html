<div class="{{ 'lg:fixed' if path == 'home' }} w-full z-50 absolute top-0 left-0 bg-gray-900 shadow-md">
    <nav class="flex items-center justify-center lg:justify-between flex-wrap p-3 lg:px-0 container mx-auto" x-data="{ isOpen: false }" @keydown.escape="isOpen = false"  @click.away="isOpen = false">
        
        <div class="flex items-center z-50">
            <a href="/" class="text-white hover:text-red-500 font-extrabold text-2xl tracking-wider uppercase transition duration-300">
                RS Maskin
            </a>
        </div>

        <button @click="isOpen = !isOpen" type="button" class="ml-auto block lg:hidden px-2 text-white hover:text-red-500 focus:outline-none focus:text-red-500 transition duration-300 z-50 relative" :class="{ 'transition transform-180': isOpen }" aria-label="Menu">
            <svg class="h-8 w-8 fill-current" xmlns="http://www.w3.org/2000/svg" viewbox="0 0 24 24">
                <path x-show="isOpen" fill-rule="evenodd" clip-rule="evenodd" d="M18.278 16.864a1 1 0 0 1-1.414 1.414l-4.829-4.828-4.828 4.828a1 1 0 0 1-1.414-1.414l4.828-4.829-4.828-4.828a1 1 0 0 1 1.414-1.414l4.829 4.828 4.828-4.828a1 1 0 1 1 1.414 1.414l-4.828 4.829 4.828 4.828z"/>
                <path x-show="!isOpen" fill-rule="evenodd" d="M4 5h16a1 1 0 0 1 0 2H4a1 1 0 1 1 0-2zm0 6h16a1 1 0 0 1 0 2H4a1 1 0 0 1 0-2zm0 6h16a1 1 0 0 1 0 2H4a1 1 0 0 1 0-2z"/>
            </svg>
        </button>

        <div class="w-full flex-grow lg:flex lg:items-center lg:w-auto text-center mt-4 lg:mt-0 p-6 lg:p-0 rounded-lg" :class="{ 'block': isOpen, 'hidden': !isOpen }" x-show.transition="true">

            {% if navigation.items %}

                <ul class="pt-6 lg:pt-0 list-reset lg:flex justify-end flex-1 items-center">
                    {% for item in navigation.items %}
                        <li class="nav__item lg:mr-6 mb-4 lg:mb-0">
                            <a @click="isOpen = false" class="text-lg font-medium inline-block text-white no-underline hover:text-red-500 py-2 px-4 transition duration-300" href="{{ item.url }}">{{ item.text }}</a>
                        </li>
                    {% endfor %}
                </ul>

            {% endif %}
        </div>
    </nav>
</div>
